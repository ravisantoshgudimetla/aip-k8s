name: E2E Tests

on:
  push:
    branches:
      - main
  pull_request:

env:
  KIND_VERSION: v0.31.0

jobs:
  test-e2e:
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/${{ env.KIND_VERSION }}/kind-linux-$(go env GOARCH)
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Verify kind installation
        run: kind version

      - name: Create Kind cluster
        run: make setup-test-e2e

      - name: Pre-load curl image into Kind
        run: |
          docker pull curlimages/curl:latest
          kind load docker-image curlimages/curl:latest --name aip-k8s-test-e2e

      - name: Running Test e2e
        run: |
          go mod tidy
          make test-e2e
        env:
          # No admission webhooks yet — cert-manager not needed.
          # When webhooks are added, remove this and add an
          # "Install cert-manager" step before this one.
          CERT_MANAGER_INSTALL_SKIP: "true"
