---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
    helm.sh/resource-policy: keep
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
  name: agentdiagnostics.governance.aip.io
spec:
  group: governance.aip.io
  names:
    kind: AgentDiagnostic
    listKind: AgentDiagnosticList
    plural: agentdiagnostics
    singular: agentdiagnostic
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.agentIdentity
      name: Agent
      type: string
    - jsonPath: .spec.diagnosticType
      name: Type
      type: string
    - jsonPath: .status.verdict
      name: Verdict
      type: string
    - jsonPath: .spec.summary
      name: Summary
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: AgentDiagnostic is the Schema for agent-originated diagnostic
          records.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AgentDiagnosticSpec defines what the agent observed.
            properties:
              agentIdentity:
                description: |-
                  AgentIdentity is the identity of the agent that recorded this diagnostic.
                  Must match the agentIdentity the agent uses in subsequent AgentRequests.
                minLength: 1
                type: string
              correlationID:
                description: |-
                  CorrelationID is a UUID generated by the agent before acting.
                  Set as a label (aip.io/correlationID) on this record and on any
                  subsequent AgentRequest to enable cross-resource querying.
                minLength: 1
                type: string
              details:
                description: |-
                  Details contains agent-specific diagnostic data in open JSON.
                  Optional. Examples: confidence scores, evidence sources, alternatives considered.
                x-kubernetes-preserve-unknown-fields: true
              diagnosticType:
                description: |-
                  DiagnosticType categorizes the observation.
                  Recommended values: observation, diagnosis, signal, escalation.
                  Open string — adopters may define domain-specific types.
                minLength: 1
                type: string
              summary:
                description: |-
                  Summary is a human-readable description of what the agent observed.
                  Required. Consumed by dashboards and audit tooling.
                maxLength: 1024
                type: string
            required:
            - agentIdentity
            - correlationID
            - diagnosticType
            - summary
            type: object
            x-kubernetes-validations:
            - message: AgentDiagnostic spec is immutable after creation
              rule: self == oldSelf
          status:
            description: AgentDiagnosticStatus defines the observed state of AgentDiagnostic.
            properties:
              reviewedAt:
                description: ReviewedAt is the timestamp of the review. Set server-side.
                format: date-time
                type: string
              reviewedBy:
                description: |-
                  ReviewedBy is the identity of the reviewer. Set server-side from the
                  authenticated caller — never accepted from the request body.
                type: string
              reviewerNote:
                description: ReviewerNote is an optional free-text annotation.
                maxLength: 512
                type: string
              verdict:
                description: Verdict is the SRE's assessment of this diagnostic.
                enum:
                - correct
                - incorrect
                - partial
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
