apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "aip-k8s.fullname" . }}-controller
  labels:
    {{- include "aip-k8s.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "aip-k8s.fullname" . }}-controller
  labels:
    {{- include "aip-k8s.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
rules:
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - discovery.k8s.io
  resources:
  - endpointslices
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - governance.aip.io
  resources:
  - agentdiagnostics
  - agentrequests
  - auditrecords
  - governedresources
  - safetypolicies
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - governance.aip.io
  resources:
  - agentrequests/finalizers
  - governedresources/finalizers
  - safetypolicies/finalizers
  verbs:
  - update
- apiGroups:
  - governance.aip.io
  resources:
  - agentdiagnostics/status
  - agentrequests/status
  - auditrecords/status
  - governedresources/status
  - safetypolicies/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
  - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "aip-k8s.fullname" . }}-controller
  labels:
    {{- include "aip-k8s.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "aip-k8s.fullname" . }}-controller
subjects:
- kind: ServiceAccount
  name: {{ include "aip-k8s.fullname" . }}-controller
  namespace: {{ .Release.Namespace }}
