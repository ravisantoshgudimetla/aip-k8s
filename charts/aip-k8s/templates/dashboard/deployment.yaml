apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aip-k8s.fullname" . }}-dashboard
  labels:
    {{- include "aip-k8s.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  replicas: {{ .Values.dashboard.replicaCount }}
  selector:
    matchLabels:
      {{- include "aip-k8s.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: dashboard
  template:
    metadata:
      labels:
        {{- include "aip-k8s.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: dashboard
    spec:
      containers:
        - name: dashboard
          image: "{{ .Values.dashboard.image.repository }}:{{ .Values.dashboard.image.tag }}"
          imagePullPolicy: {{ .Values.dashboard.image.pullPolicy }}
          command:
            - /dashboard
          args:
            - --port=8082
            - --static-dir=/cmd/dashboard
            - --gateway-url=http://{{ include "aip-k8s.fullname" . }}-gateway:8080
          ports:
            - name: http
              containerPort: 8082
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - "ALL"
          resources:
            limits:
              cpu: 200m
              memory: 128Mi
            requests:
              cpu: 10m
              memory: 64Mi
{{- if .Values.dashboard.authProxy.enabled }}
        - name: auth-proxy
          image: "{{ .Values.dashboard.authProxy.image.repository }}:{{ .Values.dashboard.authProxy.image.tag }}"
          args:
            - --provider={{ .Values.dashboard.authProxy.provider }}
            - --oidc-issuer-url={{ .Values.dashboard.authProxy.oidcIssuerURL }}
            - --upstream=http://localhost:8082
            - --http-address=0.0.0.0:{{ .Values.dashboard.authProxy.port }}
            - --redirect-url={{ .Values.dashboard.authProxy.redirectURL }}
            - --scope={{ .Values.dashboard.authProxy.scope }}
            - --email-domain={{ .Values.dashboard.authProxy.emailDomain }}
            - --pass-authorization-header={{ .Values.dashboard.authProxy.passAuthorizationHeader }}
            - --cookie-secure=true
            - --cookie-httponly=true
            - --cookie-samesite=lax
          env:
            - name: OAUTH2_PROXY_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ required "dashboard.authProxy.existingSecret is required when authProxy is enabled (must contain keys: client-id, client-secret, cookie-secret)" .Values.dashboard.authProxy.existingSecret | quote }}
                  key: client-id
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ required "dashboard.authProxy.existingSecret is required when authProxy is enabled (must contain keys: client-id, client-secret, cookie-secret)" .Values.dashboard.authProxy.existingSecret | quote }}
                  key: client-secret
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ required "dashboard.authProxy.existingSecret is required when authProxy is enabled (must contain keys: client-id, client-secret, cookie-secret)" .Values.dashboard.authProxy.existingSecret | quote }}
                  key: cookie-secret
          ports:
            - name: proxy
              containerPort: {{ .Values.dashboard.authProxy.port }}
              protocol: TCP
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - "ALL"
          resources:
            limits:
              cpu: 100m
              memory: 64Mi
            requests:
              cpu: 10m
              memory: 32Mi
{{- if .Values.dashboard.authProxy.extraVolumeMounts }}
          volumeMounts:
            {{- toYaml .Values.dashboard.authProxy.extraVolumeMounts | nindent 12 }}
{{- end }}
{{- end }}
{{- if .Values.dashboard.extraVolumes }}
      volumes:
        {{- toYaml .Values.dashboard.extraVolumes | nindent 8 }}
{{- end }}
