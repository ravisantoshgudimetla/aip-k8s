apiVersion: governance.aip.io/v1alpha1
kind: GovernedResource
metadata:
  name: scaledown-prod-deployments
spec:
  uriPattern: "k8s://prod/default/deployment/*"
  permittedActions:
    - delete
    - scale
    - scale-down
    - escalate
  contextFetcher: k8s-deployment
  soakMode: true
  description: "Production deployments — live Kubernetes state fetched for safety policy evaluation."
