apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "aip-k8s.fullname" . }}-gateway
  labels:
    {{- include "aip-k8s.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "aip-k8s.fullname" . }}-gateway
  labels:
    {{- include "aip-k8s.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
rules:
- apiGroups:
  - governance.aip.io
  resources:
  - agentrequests
  - agentrequests/status
  - auditrecords
  - diagnosticaccuracysummaries
  - diagnosticaccuracysummaries/status
  - governedresources
  - governedresources/status
  - safetypolicies
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "aip-k8s.fullname" . }}-gateway
  labels:
    {{- include "aip-k8s.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "aip-k8s.fullname" . }}-gateway
subjects:
- kind: ServiceAccount
  name: {{ include "aip-k8s.fullname" . }}-gateway
  namespace: {{ .Release.Namespace }}
