name: Chart E2E Tests

on:
  workflow_run:
    workflows: ["Publish Images"]
    types: [completed]
    branches: [main]

env:
  KIND_VERSION: v0.31.0
  GW_PORT: 18080
  DASH_PORT: 18082
  NAMESPACE: aip-k8s-system

jobs:
  chart-e2e:
    name: Helm install smoke test
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/${{ env.KIND_VERSION }}/kind-linux-$(go env GOARCH)
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Install helm
        uses: azure/setup-helm@v4

      - name: Create Kind cluster
        run: kind create cluster --name chart-e2e --wait 60s

      - name: Export kubeconfig path
        run: echo "KUBECONFIG=$HOME/.kube/config" >> "$GITHUB_ENV"

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tag
        id: tag
        run: echo "sha=sha-$(echo '${{ github.event.workflow_run.head_sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Pull and load images into Kind
        run: |
          for img in controller gateway dashboard; do
            docker pull ghcr.io/${{ github.repository }}/${img}:${{ steps.tag.outputs.sha }}
            kind load docker-image ghcr.io/${{ github.repository }}/${img}:${{ steps.tag.outputs.sha }} --name chart-e2e
          done

      - name: Helm install chart
        run: |
          helm upgrade --install aip-k8s charts/aip-k8s/ \
            --namespace ${{ env.NAMESPACE }} --create-namespace \
            --set controller.image.tag=${{ steps.tag.outputs.sha }} \
            --set gateway.image.tag=${{ steps.tag.outputs.sha }} \
            --set dashboard.image.tag=${{ steps.tag.outputs.sha }} \
            --set gc.enabled=true \
            --set gc.interval=1m \
            --set gc.diagnosticHardTTL=1m \
            --wait --timeout 3m

      - name: Start port-forwards
        run: |
          kubectl port-forward -n ${{ env.NAMESPACE }} svc/aip-k8s-gateway ${{ env.GW_PORT }}:8080 &
          echo $! > /tmp/aip-gw.pid
          kubectl port-forward -n ${{ env.NAMESPACE }} svc/aip-k8s-dashboard ${{ env.DASH_PORT }}:8082 &
          echo $! > /tmp/aip-dash.pid
          sleep 3

      - name: Run chart e2e tests
        run: |
          go test -v -tags=e2e ./test/e2e/... \
            -ginkgo.v -ginkgo.focus "Chart"
        env:
          GATEWAY_URL: http://localhost:${{ env.GW_PORT }}
          DASHBOARD_URL: http://localhost:${{ env.DASH_PORT }}
          IMAGE_TAG: ${{ steps.tag.outputs.sha }}

      - name: Run full e2e suite against chart deployment
        run: |
          go test -v -tags=e2e ./test/e2e/... -ginkgo.v
        env:
          HELM_DEPLOYED: "true"
          KUBECONFIG: ${{ env.KUBECONFIG }}
          GATEWAY_URL: http://localhost:${{ env.GW_PORT }}
          DASHBOARD_URL: http://localhost:${{ env.DASH_PORT }}
          IMAGE_TAG: ${{ steps.tag.outputs.sha }}

      - name: Stop port-forwards
        if: always()
        run: |
          [ -f /tmp/aip-gw.pid ]   && kill $(cat /tmp/aip-gw.pid)   2>/dev/null || true
          [ -f /tmp/aip-dash.pid ] && kill $(cat /tmp/aip-dash.pid) 2>/dev/null || true

      - name: Dump logs on failure
        if: failure()
        run: |
          kubectl get pods -n ${{ env.NAMESPACE }}
          kubectl describe pods -n ${{ env.NAMESPACE }}
          for deploy in controller gateway dashboard; do
            echo "=== ${deploy} logs ==="
            kubectl logs -n ${{ env.NAMESPACE }} -l app.kubernetes.io/component=${deploy} --tail=50 || true
          done
