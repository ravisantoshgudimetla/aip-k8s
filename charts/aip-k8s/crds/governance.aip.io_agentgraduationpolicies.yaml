kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: agentgraduationpolicies.governance.aip.io
spec:
  group: governance.aip.io
  names:
    kind: AgentGraduationPolicy
    listKind: AgentGraduationPolicyList
    plural: agentgraduationpolicies
    singular: agentgraduationpolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.evaluationWindow.count
      name: Window
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          AgentGraduationPolicy is the Schema for the agentgraduationpolicies API.
          Cluster-admin-managed — defines thresholds for trust level graduation.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AgentGraduationPolicySpec defines the thresholds for each
              trust level.
            properties:
              awaitingVerdictTTL:
                description: |-
                  AwaitingVerdictTTL is the duration after which ungraded requests expire.
                  e.g. "168h" for 7 days.
                pattern: ^([0-9]+(\.[0-9]+)?(ns|us|µs|ms|s|m|h))+$
                type: string
              demotionPolicy:
                description: DemotionPolicy defines when an agent should be demoted.
                properties:
                  accuracyDropThreshold:
                    description: AccuracyDropThreshold is the accuracy drop that triggers
                      demotion.
                    maximum: 1
                    minimum: 0
                    type: number
                  gracePeriod:
                    description: |-
                      GracePeriod is the duration an agent is permitted to stay at its current
                      level after falling below thresholds before demotion is applied.
                      e.g. "24h".
                    pattern: ^([0-9]+(\.[0-9]+)?(ns|us|µs|ms|s|m|h))+$
                    type: string
                  windowSize:
                    description: WindowSize is the number of recent verdicts to check
                      for demotion.
                    format: int64
                    minimum: 1
                    type: integer
                required:
                - accuracyDropThreshold
                - windowSize
                type: object
              evaluationWindow:
                description: EvaluationWindow defines the rolling window for trust
                  evaluation.
                properties:
                  count:
                    description: Count is the number of recent verdicts to consider.
                    format: int64
                    minimum: 1
                    type: integer
                required:
                - count
                type: object
              levels:
                description: Levels defines the graduation levels and their requirements.
                items:
                  description: GraduationLevel defines the requirements and permissions
                    for a trust level.
                  properties:
                    accuracy:
                      description: Accuracy defines the accuracy band for this level.
                      properties:
                        demotionBuffer:
                          description: DemotionBuffer is the margin below min that
                            triggers demotion.
                          maximum: 1
                          minimum: 0
                          type: number
                        max:
                          description: Max is the maximum accuracy for this level
                            (upper bound).
                          maximum: 1
                          minimum: 0
                          type: number
                        min:
                          description: Min is the minimum accuracy required for this
                            level.
                          maximum: 1
                          minimum: 0
                          type: number
                      type: object
                    canExecute:
                      description: CanExecute indicates whether agents at this level
                        may execute actions.
                      type: boolean
                    executions:
                      description: Executions defines the execution count band for
                        this level.
                      properties:
                        max:
                          description: Max is the maximum executions for this level
                            (upper bound).
                          format: int64
                          minimum: 0
                          type: integer
                        min:
                          description: Min is the minimum executions required for
                            this level.
                          format: int64
                          minimum: 0
                          type: integer
                      type: object
                    name:
                      description: 'Name is the level name: Observer|Advisor|Supervised|Trusted|Autonomous.'
                      enum:
                      - Observer
                      - Advisor
                      - Supervised
                      - Trusted
                      - Autonomous
                      type: string
                    requiresHumanApproval:
                      description: RequiresHumanApproval indicates whether human approval
                        is required.
                      type: boolean
                  required:
                  - canExecute
                  - name
                  type: object
                minItems: 1
                type: array
            required:
            - demotionPolicy
            - evaluationWindow
            - levels
            type: object
          status:
            description: AgentGraduationPolicyStatus defines the observed state of
              AgentGraduationPolicy.
            properties:
              conditions:
                description: Conditions hold the latest available observations of
                  the AgentGraduationPolicy's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
