apiVersion: v1
kind: Service
metadata:
  name: {{ include "aip-k8s.fullname" . }}-gateway
  labels:
    {{- include "aip-k8s.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  type: {{ .Values.gateway.service.type }}
  ports:
    - port: {{ .Values.gateway.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "aip-k8s.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
