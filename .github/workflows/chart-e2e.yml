name: Chart E2E Tests

on:
  workflow_run:
    workflows: ["Publish Images"]
    types: [completed]
    branches: [main]

env:
  KIND_VERSION: v0.25.0

jobs:
  chart-e2e:
    name: Helm install smoke test
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/${{ env.KIND_VERSION }}/kind-linux-$(go env GOARCH)
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Install helm
        uses: azure/setup-helm@v4

      - name: Create Kind cluster
        run: kind create cluster --name chart-e2e --wait 60s

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tag
        id: tag
        run: echo "sha=sha-$(echo '${{ github.event.workflow_run.head_sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Pull and load images into Kind
        run: |
          for img in controller gateway dashboard; do
            docker pull ghcr.io/${{ github.repository }}/${img}:${{ steps.tag.outputs.sha }}
            kind load docker-image ghcr.io/${{ github.repository }}/${img}:${{ steps.tag.outputs.sha }} --name chart-e2e
          done

      - name: Helm install aip-k8s
        run: |
          helm install aip-k8s charts/aip-k8s/ \
            --namespace aip-k8s-system \
            --create-namespace \
            --set controller.image.tag=${{ steps.tag.outputs.sha }} \
            --set gateway.image.tag=${{ steps.tag.outputs.sha }} \
            --set dashboard.image.tag=${{ steps.tag.outputs.sha }} \
            --wait \
            --timeout 3m

      - name: Run chart e2e tests
        run: make chart-e2e CHART_IMAGE_TAG=${{ steps.tag.outputs.sha }}
        env:
          KUBECONFIG: ${{ env.HOME }}/.kube/config

      - name: Dump logs on failure
        if: failure()
        run: |
          kubectl get pods -n aip-k8s-system
          kubectl describe pods -n aip-k8s-system
          for deploy in controller gateway dashboard; do
            echo "=== ${deploy} logs ==="
            kubectl logs -n aip-k8s-system -l app.kubernetes.io/component=${deploy} --tail=50 || true
          done
