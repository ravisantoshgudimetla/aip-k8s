apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aip-k8s.fullname" . }}-gateway
  labels:
    {{- include "aip-k8s.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  replicas: {{ .Values.gateway.replicaCount }}
  selector:
    matchLabels:
      {{- include "aip-k8s.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        {{- include "aip-k8s.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: gateway
    spec:
      serviceAccountName: {{ include "aip-k8s.fullname" . }}-gateway
      containers:
        - name: gateway
          image: "{{ .Values.gateway.image.repository }}:{{ .Values.gateway.image.tag }}"
          imagePullPolicy: {{ .Values.gateway.image.pullPolicy }}
          command:
            - /gateway
          args:
            - --addr=:8080
            - --dedup-window={{ .Values.gateway.dedupWindow }}
            {{- if .Values.gateway.auth.oidcIssuerURL }}
            - --oidc-issuer-url={{ .Values.gateway.auth.oidcIssuerURL }}
            - --oidc-audience={{ .Values.gateway.auth.oidcAudience }}
            {{- end }}
            {{- if .Values.gateway.auth.agentSubjects }}
            - --agent-subjects={{ .Values.gateway.auth.agentSubjects }}
            {{- end }}
            {{- if .Values.gateway.auth.reviewerSubjects }}
            - --reviewer-subjects={{ .Values.gateway.auth.reviewerSubjects }}
            {{- end }}
            {{- if .Values.gateway.auth.trustedProxyCIDRs }}
            - --trusted-proxy-cidrs={{ .Values.gateway.auth.trustedProxyCIDRs }}
            {{- end }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - "ALL"
          resources:
            limits:
              cpu: 200m
              memory: 128Mi
            requests:
              cpu: 10m
              memory: 64Mi
