apiVersion: governance.aip.io/v1alpha1
kind: SafetyPolicy
metadata:
  name: live-traffic-guard
  namespace: default
spec:
  targetSelector:
    matchActions: ["delete", "deleted", "scale", "scale-down", "escalate"]

  rules:
    # Deny autonomous deletion of any resource with active endpoints.
    # The agent cannot unilaterally delete a live service — this is terminal.
    # If the agent genuinely believes deletion is warranted, it must escalate
    # (action: escalate) so a human can review the contradicting evidence.
    - name: delete-with-live-signals
      type: StateEvaluation
      action: Deny
      expression: >
        (request.spec.action == "delete" || request.spec.action == "deleted") &&
        (target.hasActiveEndpoints == true || target.readyReplicas > 0)

    # Deny autonomous scale-to-zero on a resource with ready replicas.
    # Scaling to 0 is operationally equivalent to deletion for a live service.
    - name: scale-to-zero-with-ready-replicas
      type: StateEvaluation
      action: Deny
      expression: >
        request.spec.action == "scale" &&
        target.readyReplicas > 0

    # Deny autonomous scale-down on a resource actively serving traffic.
    - name: scale-down-with-ready-replicas
      type: StateEvaluation
      action: Deny
      expression: >
        request.spec.action == "scale-down" &&
        target.readyReplicas > 1

    # RequireApproval only for explicit agent escalations.
    # When an agent submits action: escalate, it is declaring it cannot
    # resolve the conflict autonomously and is handing off to a human.
    # This is the only path that creates a pending human review request.
    - name: escalation-requires-human
      type: StateEvaluation
      action: RequireApproval
      expression: >
        request.spec.action == "escalate"

  failureMode: FailClosed
