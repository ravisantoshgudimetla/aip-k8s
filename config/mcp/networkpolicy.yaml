apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: github-mcp-policy
  namespace: aip-k8s-system
spec:
  podSelector:
    matchLabels:
      app: github-mcp-server
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/component: gateway
      namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: aip-k8s-system
    ports:
    - protocol: TCP
      port: 8080
  egress:
  # Allow DNS resolution (kube-dns / CoreDNS)
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # Allow HTTPS to GitHub API and any external MCP endpoints
  - ports:
    - protocol: TCP
      port: 443
