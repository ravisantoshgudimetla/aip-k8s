apiVersion: v1
kind: Service
metadata:
  name: {{ include "aip-k8s.fullname" . }}-dashboard
  labels:
    {{- include "aip-k8s.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  type: {{ .Values.dashboard.service.type }}
  ports:
    - port: {{ .Values.dashboard.service.port }}
      targetPort: {{ if .Values.dashboard.authProxy.enabled }}proxy{{ else }}http{{ end }}
      protocol: TCP
      name: http
  selector:
    {{- include "aip-k8s.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
