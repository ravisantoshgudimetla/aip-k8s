# Default values for aip-k8s.

controller:
  image:
    repository: ghcr.io/ravisantoshgudimetla/aip-k8s/controller
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1

gateway:
  image:
    repository: ghcr.io/ravisantoshgudimetla/aip-k8s/gateway
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  dedupWindow: 24h
  auth:
    oidcIssuerURL: ""
    oidcAudience: "aip-gateway"
    # oidcIdentityClaim: the JWT claim used as caller identity.
    # "sub" (default) works for most OIDC providers.
    # Use "azp" for Keycloak client_credentials, "appid" for Azure AD,
    # "email" for Google service accounts.
    oidcIdentityClaim: "sub"
    # oidcGroupsClaim: JWT claim carrying group memberships (array of strings).
    # Common values: "groups", "roles", "group_memberships".
    oidcGroupsClaim: "groups"
    agentSubjects: ""
    reviewerSubjects: ""
    # agentGroups/reviewerGroups: grant roles to all members of a group.
    # "anyone in sre-team can review" instead of listing every individual.
    agentGroups: ""
    reviewerGroups: ""
    adminSubjects: ""
    adminGroups: ""
    trustedProxyCIDRs: ""
    requireGovernedResource: false
  service:
    type: ClusterIP
    port: 8080
  extraVolumeMounts: []
  extraVolumes: []

dashboard:
  image:
    repository: ghcr.io/ravisantoshgudimetla/aip-k8s/dashboard
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    port: 8082
  authProxy:
    enabled: false
    image:
      repository: quay.io/oauth2-proxy/oauth2-proxy
      tag: latest
    provider: "oidc"
    oidcIssuerURL: ""
    scope: "openid groups email"
    emailDomain: "*"
    existingSecret: ""   # K8s Secret with keys: client-id, client-secret, cookie-secret
    redirectURL: ""
    passAuthorizationHeader: true
    port: 4180
    extraVolumeMounts: []
    extraArgs: []
  extraVolumeMounts: []
  extraVolumes: []

gc:
  enabled: false
  dryRun: true
  interval: "1h"
  diagnosticHardTTL: "336h"   # 14 days
  diagnosticRetentionTTL: "0" # 0 disables soft retention; use e.g. "7d" to enable
  exportType: "none"          # "none" or "otlp"
  otlpEndpoint: ""            # required when exportType=otlp
  exportConcurrency: 5
  deleteRatePerSec: 100
  pageSize: 500
  safetyMinCount: 10
