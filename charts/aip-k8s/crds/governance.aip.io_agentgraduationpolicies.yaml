---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: agentgraduationpolicies.governance.aip.io
spec:
  group: governance.aip.io
  names:
    kind: AgentGraduationPolicy
    listKind: AgentGraduationPolicyList
    plural: agentgraduationpolicies
    singular: agentgraduationpolicy
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.evaluationWindow.count
      name: Window
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          AgentGraduationPolicy is the Schema for the agentgraduationpolicies API.
          Cluster-admin-managed — defines thresholds for trust level graduation.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AgentGraduationPolicySpec defines the thresholds for each
              trust level.
            properties:
              awaitingVerdictTTL:
                description: |-
                  AwaitingVerdictTTL is the duration after which ungraded requests expire.
                  e.g. "168h" for 7 days.
                type: string
              demotionPolicy:
                description: DemotionPolicy defines when an agent should be demoted.
                properties:
                  accuracyDropThreshold:
                    description: AccuracyDropThreshold is the accuracy drop that triggers
                      demotion.
                    type: number
                  gracePeriod:
                    description: |-
                      GracePeriod is the duration an agent is permitted to stay at its current
                      level after falling below thresholds before demotion is applied.
                      e.g. "24h".
                    type: string
                  windowSize:
                    description: WindowSize is the number of recent verdicts to check
                      for demotion.
                    format: int64
                    type: integer
                required:
                - accuracyDropThreshold
                - windowSize
                type: object
              evaluationWindow:
                description: EvaluationWindow defines the rolling window for trust
                  evaluation.
                properties:
                  count:
                    description: Count is the number of recent verdicts to consider.
                    format: int64
                    type: integer
                required:
                - count
                type: object
              levels:
                description: Levels defines the graduation levels and their requirements.
                items:
                  description: GraduationLevel defines the requirements and permissions
                    for a trust level.
                  properties:
                    accuracy:
                      description: Accuracy defines the accuracy band for this level.
                      properties:
                        demotionBuffer:
                          description: DemotionBuffer is the margin below min that
                            triggers demotion.
                          type: number
                        max:
                          description: Max is the maximum accuracy for this level
                            (upper bound).
                          type: number
                        min:
                          description: Min is the minimum accuracy required for this
                            level.
                          type: number
                      type: object
                    canExecute:
                      description: CanExecute indicates whether agents at this level
                        may execute actions.
                      type: boolean
                    executions:
                      description: Executions defines the execution count band for
                        this level.
                      properties:
                        max:
                          description: Max is the maximum executions for this level
                            (upper bound).
                          format: int64
                          type: integer
                        min:
                          description: Min is the minimum executions required for
                            this level.
                          format: int64
                          type: integer
                      type: object
                    name:
                      description: 'Name is the level name: Observer|Advisor|Supervised|Trusted|Autonomous.'
                      type: string
                    requiresHumanApproval:
                      description: RequiresHumanApproval indicates whether human approval
                        is required.
                      type: boolean
                  required:
                  - canExecute
                  - name
                  type: object
                type: array
            required:
            - demotionPolicy
            - evaluationWindow
            - levels
            type: object
        type: object
    served: true
    storage: true
    subresources: {}
