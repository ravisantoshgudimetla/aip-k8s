apiVersion: governance.aip.io/v1alpha1
kind: GovernedResource
metadata:
  # GovernedResource is cluster-scoped — no namespace.
  name: prod-deployments
spec:
  # Glob pattern matched against AgentRequest.spec.target.uri.
  # ** crosses path separators; * does not.
  uriPattern: "k8s://prod/default/deployment/*"

  # Only these action strings are accepted. Requests with other actions are
  # rejected before any policy evaluation.
  permittedActions:
    - deploy
    - scale-up
    - scale-down
    - restart

  # Optional: restrict to specific agent identities. Empty means any
  # authenticated agent may target this resource.
  permittedAgents:
    - deploy-agent

  # Populates live Kubernetes state (readyReplicas, hasActiveEndpoints, etc.)
  # for SafetyPolicy CEL expressions that reference target.* fields.
  # Use "none" when policies only reference request.spec.* fields.
  contextFetcher: k8s

  description: "Production deployments. Requires human approval for any scaling or deployment action."

  # Trust requirements enforce a floor and ceiling on agent autonomy for this
  # resource, independent of what the AgentGraduationPolicy permits globally.
  #
  # minTrustLevel: agents below this level cannot target this resource.
  # maxAutonomyLevel: caps effective autonomy — a Trusted agent is treated as
  #   Supervised here, so human approval is always required.
  trustRequirements:
    minTrustLevel: Supervised
    maxAutonomyLevel: Supervised
