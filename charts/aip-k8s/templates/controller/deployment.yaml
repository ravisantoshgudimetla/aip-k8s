apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aip-k8s.fullname" . }}-controller
  labels:
    {{- include "aip-k8s.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
spec:
  replicas: {{ .Values.controller.replicaCount }}
  selector:
    matchLabels:
      {{- include "aip-k8s.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        {{- include "aip-k8s.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: controller
        control-plane: controller-manager
    spec:
      serviceAccountName: {{ include "aip-k8s.fullname" . }}-controller
      containers:
        - name: manager
          image: "{{ .Values.controller.image.repository }}:{{ .Values.controller.image.tag }}"
          imagePullPolicy: {{ .Values.controller.image.pullPolicy }}
          command:
            - /manager
          args:
            - --health-probe-bind-address=:8081
            - --metrics-bind-address=0
            - --leader-elect
            - --gc-enabled={{ .Values.gc.enabled }}
            {{- if .Values.gc.enabled }}
            - --gc-dry-run={{ .Values.gc.dryRun }}
            - --gc-interval={{ .Values.gc.interval }}
            - --gc-diagnostic-hard-ttl={{ .Values.gc.diagnosticHardTTL }}
            - --gc-delete-rate-per-sec={{ .Values.gc.deleteRatePerSec }}
            - --gc-page-size={{ .Values.gc.pageSize }}
            - --gc-safety-min-count={{ .Values.gc.safetyMinCount }}
            {{- end }}
          ports:
            - containerPort: 8081
              name: health
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - "ALL"
          resources:
            limits:
              cpu: 500m
              memory: 128Mi
            requests:
              cpu: 10m
              memory: 64Mi
